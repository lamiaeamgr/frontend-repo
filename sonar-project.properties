# SonarQube — frontend-repo (React / Vite)
# Jenkins example: sonar-scanner -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN

sonar.projectKey=frontend-repo
sonar.projectName=frontend-repo
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.jsx,src/**/*.test.js

# Keep analysis focused; never scan dependencies or build output
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/public/**,**/.jenkins-node/**

sonar.sourceEncoding=UTF-8

# After: npm run test -- --coverage (if you add coverage to vitest)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
